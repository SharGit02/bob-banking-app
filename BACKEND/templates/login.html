{% extends "base.html" %}

{% block title %}Login — BankApp{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">

        <h4 class="card-title text-center mb-1">Welcome to BankApp</h4>
        <p class="text-center text-muted mb-4" style="font-size:14px;">
          Please sign in to access your account.
        </p>

        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Login</button>
          </div>

        </form>
      </div>
    </div>

    <p class="text-center text-muted mt-3" style="font-size: 13px;">
      Demo credentials &mdash; username: <strong>demo</strong> &nbsp;/&nbsp; password: <strong>password123</strong>
    </p>
  </div>
</div>
{% endblock %}
