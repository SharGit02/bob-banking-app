{% extends "base.html" %}

{% block title %}Withdraw — BankApp{% endblock %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container" style="max-width: 760px;">
    <a class="navbar-brand" href="{{ url_for('dashboard.dashboard') }}">BankApp</a>
    <div class="ms-auto">
      <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </div>
</nav>
{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-sm-10 col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">

        <h4 class="card-title mb-4">Withdraw Funds</h4>

        <form method="POST" action="{{ url_for('transactions.withdraw') }}" novalidate>

          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount ($)</label>
            <input
              type="number"
              id="amount"
              name="amount"
              class="form-control form-control-lg"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
            <div class="form-text text-muted">Enter the amount you wish to withdraw.</div>
          </div>

          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-warning btn-lg">Confirm Withdrawal</button>
          </div>

          <div class="text-center">
            <a href="{{ url_for('dashboard.dashboard') }}" class="text-decoration-none text-muted">
              &larr; Back to Dashboard
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
