<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw — BankApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background-color: #f7f8fa; }</style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
  <div class="container" style="max-width: 760px;">
    <a class="navbar-brand fw-bold" href="/dashboard">BankApp</a>
    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>
<div class="container mt-4" style="max-width: 760px;">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-4">Withdraw Funds</h4>
          <form method="POST" action="/withdraw">
            <div class="mb-4">
              <label for="amount" class="form-label fw-semibold">Amount ($)</label>
              <input type="number" id="amount" name="amount" class="form-control form-control-lg" placeholder="0.00" min="0.01" step="0.01" />
            </div>
            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-warning btn-lg">Confirm Withdrawal</button>
            </div>
            <div class="text-center">
              <a href="/dashboard" class="text-muted text-decoration-none">&larr; Back to Dashboard</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
