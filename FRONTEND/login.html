<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BankApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background-color: #f7f8fa; }</style>
</head>
<body>
<div class="container mt-5" style="max-width: 480px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-1">Welcome to BankApp</h4>
      <p class="text-center text-muted mb-4" style="font-size:14px;">Please sign in to access your account.</p>
      <form method="POST" action="/login">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">Login</button>
        </div>
      </form>
    </div>
  </div>
  <p class="text-center text-muted mt-3" style="font-size:13px;">Demo: <strong>demo</strong> / <strong>password123</strong></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
