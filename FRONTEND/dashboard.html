<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — BankApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>body { background-color: #f7f8fa; } .balance-display { font-size: 2.4rem; font-weight: 700; color: #198754; }</style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
  <div class="container" style="max-width: 760px;">
    <span class="navbar-brand fw-bold">BankApp</span>
    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>
<div class="container mt-4" style="max-width: 760px;">
  <h5 class="text-muted mb-1">Welcome back,</h5>
  <h2 class="mb-4">Customer Name</h2>
  <div class="card mb-4">
    <div class="card-body text-center py-4">
      <p class="text-muted mb-1" style="font-size:14px;">Current Balance</p>
      <p class="balance-display mb-0">$0.00</p>
    </div>
  </div>
  <div class="row g-3">
    <div class="col-6"><a href="/deposit" class="btn btn-success btn-lg w-100">Deposit</a></div>
    <div class="col-6"><a href="/withdraw" class="btn btn-warning btn-lg w-100">Withdraw</a></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
